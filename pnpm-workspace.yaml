# 悪意のあるリリースは1週間以内に発見され、レジストリから削除される為
# config = 7 day x 24h x 60 min
minimumReleaseAge: 10080
# 明示設定時は strict がデフォルト true のため、lockfile 再生成時に exclude を自動追記する
minimumReleaseAgeStrict: false

# minimumReleaseAge 未満のリリースを許可するパッケージ
minimumReleaseAgeExclude:
  # 公開から 7 日未満の依存も許可（Angular 更新・ツールチェーン向け）
  - '@angular/*'
  - '@angular-devkit/*'
  - '@ngtools/*'
  - '@schematics/*'
  - '@types/*'

allowBuilds:
  '@parcel/watcher': set this to true or false
  esbuild: set this to true or false
  lmdb: set this to true or false
  msgpackr-extract: set this to true or false
