# 悪意のあるリリースは1週間以内に発見され、レジストリから削除される為
# config = 7 day x 24h x 60 min
minimumReleaseAge: 10080

# minimumReleaseAge 未満のリリースを許可するパッケージ
# スコープ指定はその配下の全バージョンが対象、パッケージ@バージョンは該当バージョンのみ
minimumReleaseAgeExclude:
  # Angular 22 系（リリースから7日未満のため除外）
  - '@angular/*'
  - '@angular-devkit/*'
  - '@ngtools/*'
  - '@schematics/*'
  # 開発依存（バージョンアップ時は除外リストも更新すること）
  - '@types/node@25.9.2'
  - jasmine-core@6.3.0

allowBuilds:
  '@parcel/watcher': set this to true or false
  esbuild: set this to true or false
  lmdb: set this to true or false
  msgpackr-extract: set this to true or false
